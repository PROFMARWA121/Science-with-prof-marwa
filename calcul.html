<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>حساب المعدل</title>
</head>
<body style="font-family:Arial;text-align:center;padding:30px;direction:rtl;">

<h1>حساب المعدل</h1>

<input type="number" id="n1" placeholder="النقطة الأولى"><br><br>
<input type="number" id="n2" placeholder="النقطة الثانية"><br><br>

<button onclick="calc()">احسب</button>

<h2 id="result"></h2>

<script>
function calc(){
let a = Number(document.getElementById("n1").value);
let b = Number(document.getElementById("n2").value);

document.getElementById("result").innerHTML =
"المعدل = " + ((a+b)/2).toFixed(2);
}
</script>

</body>
</html>
