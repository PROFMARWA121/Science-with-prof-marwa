<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قداه بقى؟</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
text-align:center;
margin:0;
padding:20px;
}

h1{
color:#2f5fd0;
}

.container{
background:linear-gradient(45deg,#2f5fd0,#4f7cff);
color:white;
padding:20px;
border-radius:25px;
max-width:500px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.box{
background:rgba(255,255,255,0.2);
padding:25px;
border-radius:20px;
font-size:30px;
font-weight:bold;
}

.label{
font-size:18px;
margin-top:10px;
}

a{
display:inline-block;
margin-top:20px;
background:white;
color:#2f5fd0;
padding:12px 25px;
border-radius:20px;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<h1>الوقت المتبقي للبكالوريا 2027</h1>

<div class="container">

<div class="grid">
<div class="box">
<span id="days">0</span>
<div class="label">يوم</div>
</div>

<div class="box">
<span id="hours">0</span>
<div class="label">ساعة</div>
</div>

<div class="box">
<span id="minutes">0</span>
<div class="label">دقيقة</div>
</div>

<div class="box">
<span id="seconds">0</span>
<div class="label">ثانية</div>
</div>
</div>

</div>

<a href="index.html">العودة للرئيسية</a>

<script>
const targetDate = new Date("June 14, 2027 08:00:00").getTime();

setInterval(function(){

const now = new Date().getTime();
const distance = targetDate - now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
const seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;
document.getElementById("seconds").innerHTML = seconds;

},1000);
</script>

</body>
</html>
