<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    padding:20px;
    background:#f5f5f5;
    font-family:Tahoma,sans-serif;
}

.container{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
}

.card{
    background:linear-gradient(135deg,#214bc9,#4f7cff);
    border-radius:28px;
    height:190px;
    position:relative;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    color:white;
    text-align:center;
    font-size:18px;
    font-weight:bold;

    box-shadow:0 10px 25px rgba(0,0,0,.15);
    overflow:hidden;
}

.card::before{
    content:"";
    position:absolute;
    width:140px;
    height:140px;
    background:rgba(255,255,255,.08);
    border-radius:50%;
    top:-50px;
    right:-30px;
}

    width:75px;
    height:75px;
