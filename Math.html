    <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
padding:20px;
background:#f3f3f3;
font-family:Arial,sans-serif;
direction:rtl;
}

h1{
text-align:center;
color:#2454d3;
margin-bottom:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

.card{
height:140px;
border-radius:28px;
background:linear-gradient(135deg,#234fcf,#4a7cff);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
font-size:24px;
font-weight:bold;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,.15);
}

.icon{
font-size:48px;
margin-bottom:15px;
}
</style>

<title>الرياضيات</title>
</head>

<body>

<h1>مادة العلوم الطبيعية</h1>

<div class="cards">



<div class="card">
<div class="icon">📚</div>
المكتسبات القبلية
</div>

<div class="card">
<div class="icon">🧬</div>
تركيب البروتين
</div>

<div class="card">
<div class="icon">🔗</div>
العلاقة بين بنية ووظيفة البروتين
</div>

<div class="card">
<div class="icon">🛡️</div>
المناعة
</div>

<div class="card">
<div class="icon">🔬</div>
جميع التجارب المقررة
</div>

<div class="card">
<div class="icon">📄</div>
النصوص العلمية
</div>

<div class="card">
<div class="icon">📖</div>
كتب خارجية
</div>

<div class="card">
<div class="icon">📝</div>
منهجية الإجابة
</div>

<div class="card">
<div class="icon">📑</div>
مواضيع البكالوريا
</div>

<div class="card">
<div class="icon">🏅</div>
مواضيع أشبال الأمة
</div>

</div>

</body>
</html>
