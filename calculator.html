<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>حساب المعدل</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7ff;
padding:20px;
text-align:center;
}

h1{
color:#2563eb;
}

select,button,input{
padding:10px;
margin:5px;
border-radius:10px;
border:1px solid #ccc;
}

.subject{
background:white;
padding:10px;
margin:10px auto;
max-width:500px;
border-radius:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:#2563eb;
color:white;
border:none;
cursor:pointer;
font-size:18px;
padding:12px 25px;
}

#result{
font-size:28px;
font-weight:bold;
color:#16a34a;
margin-top:20px;
}
</style>
</head>

<body>

<h1>🧮 حساب المعدل</h1>

<select id="stream" onchange="loadSubjects()">
<option value="">اختر الشعبة</option>
<option value="science">علوم تجريبية</option>
<option value="math">رياضيات</option>
</select>

<div id="subjects"></div>

<button onclick="calculate()">احسب المعدل</button>

<div id="result"></div>

<script>

const streams = {

science: [
["علوم طبيعية",6],
["رياضيات",5],
["فيزياء",5],
["عربية",3],
["فرنسية",2],
["إنجليزية",2],
["فلسفة",2],
["تاريخ وجغرافيا",2],
["إسلامية",2],
["رياضة",1]
],

math: [
["رياضيات",7],
["فيزياء",6],
["علوم طبيعية",2],
["عربية",3],
["فرنسية",2],
["إنجليزية",2],
["فلسفة",2],
["تاريخ وجغرافيا",2],
["إسلامية",2],
["رياضة",1]
]

};

function loadSubjects(){

const stream=document.getElementById("stream").value;
const container=document.getElementById("subjects");

container.innerHTML="";

if(!stream) return;

streams[stream].forEach((sub,index)=>{

container.innerHTML += `
<div class="subject">
<span>${sub[0]} (معامل ${sub[1]})</span>
<input type="number"
id="mark${index}"
min="0"
max="20"
step="0.01"
placeholder="العلامة">
</div>
`;

});

}

function calculate(){

const stream=document.getElementById("stream").value;

if(!stream) return;

let total=0;
let coeffs=0;

streams[stream].forEach((sub,index)=>{

const mark=parseFloat(document.getElementById(`mark${index}`).value)||0;

total += mark*sub[1];
coeffs += sub[1];

});

const average=(total/coeffs).toFixed(2);

document.getElementById("result").innerHTML=
"معدلك هو : "+average;

}

</script>

</body>
</html>
